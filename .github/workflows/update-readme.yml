# 2026-05-15: migrated to self-hosted runner (was ubuntu-latest)
name: Profile README

on:
  schedule:
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - profile_readme_update

permissions:
  contents: write

concurrency:
  group: profile-readme-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-readme:
    name: Update generated README sections
    runs-on: [self-hosted, global]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate README sections
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: python3 .github/scripts/update_profile_stats.py

      - name: Commit README changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "chochy2001"
          git config user.email "54371626+chochy2001@users.noreply.github.com"
          git add README.md
          git commit -m "Update profile README"

          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; rebasing on origin/${branch} and retrying."
            git pull --rebase --autostash origin "${branch}"
          done
          git push
