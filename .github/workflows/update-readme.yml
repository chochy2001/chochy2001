name: GitHub - Activity - Readme

on:
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-activity-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jamesgeorge007/github-activity-readme@4aefbfa1c222d70537dc6a02f0519266aab2b1ea
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
